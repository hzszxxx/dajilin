<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="60" fill="none"/>
  <!-- Text logo -->
  <text x="4" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#0f766e" letter-spacing="0.06em">DAJILIN</text>
  <text x="4" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#5eead4" letter-spacing="0.15em">JILIN TRAVEL</text>
  <!-- Accent dot -->
  <circle cx="188" cy="30" r="8" fill="url(#logoAccent)"/>
</svg>
