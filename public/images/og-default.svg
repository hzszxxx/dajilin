<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3d3b"/>
      <stop offset="50%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="300" fill="#ffffff" opacity="0.03"/>
  <circle cx="200" cy="600" r="250" fill="#ffffff" opacity="0.03"/>

  <!-- Mountain silhouettes -->
  <polygon points="0,630 200,320 380,480 520,280 700,450 850,300 1000,420 1200,250 1200,630" fill="url(#mountain)" opacity="0.4"/>
  <polygon points="0,630 150,400 300,520 450,360 600,500 750,350 900,480 1050,340 1200,460 1200,630" fill="url(#mountain)" opacity="0.25"/>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo / Brand -->
  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#5eead4" letter-spacing="0.1em">DAJILIN.NET</text>
  <rect x="80" y="135" width="60" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Main headline -->
  <text x="80" y="270" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="800" fill="#ffffff">吉林文旅</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="400" fill="#99f6e4">资源整合平台</text>

  <!-- Divider -->
  <rect x="80" y="400" width="320" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>

  <!-- Tagline -->
  <text x="80" y="450" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#a7f3d0" opacity="0.9">G331 国道 · 工业研学 · AI 导览</text>

  <!-- Bottom keywords -->
  <rect x="80" y="540" width="140" height="36" rx="18" fill="#ffffff" opacity="0.12"/>
  <text x="100" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#5eead4">长白山</text>

  <rect x="240" y="540" width="140" height="36" rx="18" fill="#ffffff" opacity="0.12"/>
  <text x="260" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#5eead4">延边</text>

  <rect x="400" y="540" width="140" height="36" rx="18" fill="#ffffff" opacity="0.12"/>
  <text x="420" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#5eead4">长春</text>

  <rect x="560" y="540" width="140" height="36" rx="18" fill="#ffffff" opacity="0.12"/>
  <text x="580" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#5eead4">冰雪季</text>

  <!-- Right side decorative element -->
  <circle cx="1050" cy="350" r="180" fill="#ffffff" opacity="0.04"/>
  <circle cx="1050" cy="350" r="120" fill="#ffffff" opacity="0.04"/>
  <circle cx="1050" cy="350" r="60" fill="#ffffff" opacity="0.06"/>
</svg>
