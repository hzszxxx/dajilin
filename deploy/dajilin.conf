# dajilin.net Nginx 部署配置
# Updated: 域名统一为 dajilin.net，dajilin.renban.xyz 301 跳转

# dajilin.renban.xyz → dajilin.net 重定向
server {
    listen 443 ssl;
    server_name dajilin.renban.xyz;
    ssl_certificate /etc/letsencrypt/live/dajilin.renban.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dajilin.renban.xyz/privkey.pem;
    return 301 https://dajilin.net$request_uri;
}

# HTTP → HTTPS 主域名
server {
    listen 80;
    server_name dajilin.net www.dajilin.net dajilin.renban.xyz;
    return 301 https://dajilin.net$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name dajilin.net www.dajilin.net;

    ssl_certificate /etc/letsencrypt/live/dajilin.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dajilin.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;

    server_tokens off;
    client_max_body_size 2m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/dajilin/current;
    index index.html;

    # Proxy AI API calls to ai-proxy service (port 3000)
    location /api/gn/public/ai/ {
        rewrite ^/api/gn(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3000$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Redirect old route-331 URLs to new self-drive URLs
    location /route-331/ {
        return 301 https://dajilin.net/self-drive/overview/;
    }

    # Locale-prefixed paths: 404 if not found (no zh fallback)
    location /en/ {
        try_files $uri $uri/ =404;
    }
    location /ja/ {
        try_files $uri $uri/ =404;
    }
    location /ko/ {
        try_files $uri $uri/ =404;
    }

    # Default (zh): fallback to zh index.html
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~ /\.well-known {
        allow all;
    }
}
