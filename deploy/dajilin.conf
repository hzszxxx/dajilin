# dajilin.net Nginx 部署配置
# 静态站点模式：Astro build 后 dist/client/ 直接由 Nginx 提供

server {
    listen 80;
    server_name dajilin.net www.dajilin.net;

    # HTTP -> HTTPS 重定向
    return 301 https://$host$request_uri;

    server_tokens off;
    client_max_body_size 2m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/dajilin/current/dist/client;
    index index.html;

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}

# HTTPS 服务器块
server {
    listen 443 ssl http2;
    server_name dajilin.net www.dajilin.net;

    ssl_certificate     /etc/letsencrypt/live/dajilin.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dajilin.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    server_tokens off;
    client_max_body_size 2m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/dajilin/current/dist/client;
    index index.html;

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
